<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAL — Player IPTV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  :root{
    --bg: #0a0e14;
    --panel: #10161f;
    --panel-2: #151d29;
    --line: #1f2a38;
    --text: #dbe4ee;
    --dim: #6f8299;
    --signal: #35e0a1;
    --signal-dim: #1c6e50;
    --live: #ff4d5e;
    --mono: 'SF Mono', 'JetBrains Mono', 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    overflow:hidden;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(53,224,161,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(53,224,161,0.04), transparent 40%);
  }
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-track{background:var(--panel);}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--signal-dim);}

  /* ===== LOGIN ===== */
  #login-screen{
    height:100vh; display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .scanline{
    position:absolute; inset:0; pointer-events:none; opacity:0.03;
    background:repeating-linear-gradient(0deg, #fff 0px, transparent 1px, transparent 2px);
  }
  .login-box{
    width:380px; background:var(--panel); border:1px solid var(--line);
    border-radius:2px; padding:36px 32px; position:relative;
    box-shadow: 0 0 0 1px rgba(53,224,161,0.04), 0 20px 60px rgba(0,0,0,0.5);
  }
  .login-box::before{
    content:''; position:absolute; top:0; left:0; width:100%; height:2px;
    background:linear-gradient(90deg, transparent, var(--signal), transparent);
    animation: scan 3s linear infinite;
  }
  @keyframes scan{ 0%{ transform:translateX(-100%);} 100%{ transform:translateX(100%);} }
  .brand{
    font-family:var(--mono); font-size:13px; letter-spacing:4px; color:var(--signal);
    margin-bottom:4px; display:flex; align-items:center; gap:8px;
  }
  .brand .dot{width:6px; height:6px; border-radius:50%; background:var(--signal); box-shadow:0 0 8px var(--signal); animation:blink 1.6s ease-in-out infinite;}
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .brand-sub{ font-size:11px; color:var(--dim); font-family:var(--mono); margin-bottom:28px; letter-spacing:1px;}
  .field{ margin-bottom:16px; }
  .field label{
    display:block; font-family:var(--mono); font-size:10px; letter-spacing:1.5px;
    color:var(--dim); text-transform:uppercase; margin-bottom:6px;
  }
  .field input{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text);
    padding:11px 12px; font-family:var(--mono); font-size:13px; border-radius:1px;
    outline:none; transition:border-color 0.15s;
  }
  .field input:focus{ border-color:var(--signal-dim); }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  #login-btn{
    width:100%; margin-top:8px; padding:12px; background:var(--signal); color:#04140d;
    border:none; font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer; border-radius:1px; transition:filter 0.15s;
  }
  #login-btn:hover{ filter:brightness(1.1); }
  #login-btn:disabled{ opacity:0.5; cursor:wait; }
  .login-msg{ font-family:var(--mono); font-size:11px; margin-top:14px; min-height:16px; color:var(--dim); }
  .login-msg.err{ color:var(--live); }
  .remember{ display:flex; align-items:center; gap:8px; margin-top:16px; }
  .remember input{ accent-color:var(--signal); }
  .remember label{ font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:0.5px; }

  /* ===== APP SHELL ===== */
  #app{ display:none; height:100vh; flex-direction:column; }
  #app.active{ display:flex; }

  #topbar{
    height:52px; background:var(--panel); border-bottom:1px solid var(--line);
    display:flex; align-items:center; padding:0 16px; gap:24px; flex-shrink:0;
  }
  #topbar .brand{ margin:0; font-size:12px; }
  .top-tabs{ display:flex; gap:2px; flex:1; }
  .top-tab{
    font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--dim);
    background:none; border:none; padding:8px 14px; cursor:pointer; text-transform:uppercase;
    border-bottom:2px solid transparent; transition:color 0.15s, border-color 0.15s;
  }
  .top-tab:hover{ color:var(--text); }
  .top-tab.active{ color:var(--signal); border-color:var(--signal); }
  #search-box{
    background:var(--bg); border:1px solid var(--line); color:var(--text);
    padding:7px 12px; font-family:var(--mono); font-size:12px; width:220px; border-radius:1px; outline:none;
  }
  #search-box:focus{ border-color:var(--signal-dim); }
  #logout-btn{
    font-family:var(--mono); font-size:10px; color:var(--dim); background:none;
    border:1px solid var(--line); padding:7px 12px; cursor:pointer; letter-spacing:1px;
  }
  #logout-btn:hover{ color:var(--live); border-color:var(--live); }

  #main{ flex:1; display:flex; min-height:0; }

  #sidebar{
    width:230px; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; flex-shrink:0; padding:10px 0;
  }
  .cat-item{
    padding:9px 18px; font-family:var(--mono); font-size:12px; color:var(--dim);
    cursor:pointer; display:flex; justify-content:space-between; border-left:2px solid transparent;
  }
  .cat-item:hover{ background:var(--panel-2); color:var(--text); }
  .cat-item.active{ color:var(--signal); border-left-color:var(--signal); background:var(--panel-2); }
  .cat-count{ color:var(--dim); font-size:10px; }

  #content{ flex:1; display:flex; flex-direction:column; min-width:0; }

  #player-wrap{
    background:#000; flex-shrink:0; position:relative;
    display:flex; align-items:center; justify-content:center;
    border-bottom:1px solid var(--line);
  }
  #player-wrap.hidden{ display:none; }
  #video{ width:100%; max-height:46vh; display:block; background:#000; }
  #now-playing{
    position:absolute; top:10px; left:12px; font-family:var(--mono); font-size:11px;
    color:var(--signal); background:rgba(0,0,0,0.5); padding:4px 10px; letter-spacing:1px;
    display:flex; align-items:center; gap:8px;
  }
  #now-playing .live-dot{ width:6px; height:6px; border-radius:50%; background:var(--live); animation:blink 1s infinite; }
  #close-player{
    position:absolute; top:10px; right:12px; background:rgba(0,0,0,0.5); border:1px solid var(--line);
    color:var(--dim); width:26px; height:26px; cursor:pointer; font-family:var(--mono);
  }
  #close-player:hover{ color:var(--live); border-color:var(--live); }

  #grid-area{ flex:1; overflow-y:auto; padding:18px; }
  #grid-title{ font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }
  #grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:12px;
  }
  .item-card{
    background:var(--panel); border:1px solid var(--line); cursor:pointer; overflow:hidden;
    transition:border-color 0.15s, transform 0.1s; border-radius:2px;
  }
  .item-card:hover{ border-color:var(--signal-dim); transform:translateY(-2px); }
  .item-thumb{
    width:100%; aspect-ratio:2/3; background:var(--panel-2); display:flex; align-items:center;
    justify-content:center; color:var(--dim); font-family:var(--mono); font-size:24px; overflow:hidden;
  }
  .item-thumb img{ width:100%; height:100%; object-fit:cover; }
  .channel-card .item-thumb{ aspect-ratio:16/10; }
  .item-name{ padding:9px 10px; font-size:12px; color:var(--text); line-height:1.35;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  #empty-state, #loading-state{
    height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--dim); font-family:var(--mono); font-size:12px; letter-spacing:1px; gap:10px;
  }
  .spinner{
    width:22px; height:22px; border:2px solid var(--line); border-top-color:var(--signal);
    border-radius:50%; animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* series episodes panel */
  #episodes-panel{ padding:18px; overflow-y:auto; flex:1; }
  .season-title{ font-family:var(--mono); font-size:11px; color:var(--signal); letter-spacing:2px; margin:18px 0 10px; text-transform:uppercase; }
  .ep-row{
    display:flex; justify-content:space-between; align-items:center; padding:10px 12px;
    background:var(--panel); border:1px solid var(--line); margin-bottom:6px; cursor:pointer; border-radius:1px;
  }
  .ep-row:hover{ border-color:var(--signal-dim); }
  .ep-num{ font-family:var(--mono); color:var(--dim); font-size:11px; width:36px; }
  .ep-name{ flex:1; font-size:12px; }
  .back-link{
    font-family:var(--mono); font-size:11px; color:var(--dim); cursor:pointer; margin-bottom:14px;
    display:inline-flex; align-items:center; gap:6px;
  }
  .back-link:hover{ color:var(--signal); }

  @media(max-width:760px){
    #sidebar{ width:150px; }
    #search-box{ width:120px; }
    .top-tab{ padding:8px 8px; font-size:10px; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="scanline"></div>
  <div class="login-box">
    <div class="brand"><span class="dot"></span>SINAL</div>
    <div class="brand-sub">PLAYER XTREAM CODES</div>

    <div class="field">
      <label>Endereço do servidor</label>
      <input id="f-server" type="text" placeholder="http://exemplo.com:8080" value="https://sinal-proxy.jessica-pereira.workers.dev" autocomplete="off">
      <div style="font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:6px;">Use o endereço do proxy: https://sinal-proxy.jessica-pereira.workers.dev</div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Usuário</label>
        <input id="f-user" type="text" autocomplete="off">
      </div>
      <div class="field">
        <label>Senha</label>
        <input id="f-pass" type="password" autocomplete="off">
      </div>
    </div>
    <button id="login-btn">Conectar</button>
    <div class="remember">
      <input type="checkbox" id="f-remember" checked>
      <label for="f-remember">Lembrar credenciais neste navegador</label>
    </div>
    <div class="login-msg" id="login-msg"></div>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="brand"><span class="dot"></span>SINAL</div>
    <div class="top-tabs">
      <button class="top-tab active" data-tab="live">TV Ao Vivo</button>
      <button class="top-tab" data-tab="vod">Filmes</button>
      <button class="top-tab" data-tab="series">Séries</button>
    </div>
    <input id="search-box" type="text" placeholder="buscar...">
    <button id="logout-btn">Sair</button>
  </div>

  <div id="main">
    <div id="sidebar"></div>

    <div id="content">
      <div id="player-wrap" class="hidden">
        <video id="video" controls autoplay></video>
        <div id="now-playing"><span class="live-dot"></span><span id="now-playing-text"></span></div>
        <button id="close-player">✕</button>
      </div>

      <div id="grid-area">
        <div id="grid-title">TV Ao Vivo</div>
        <div id="loading-state" style="display:none;"><div class="spinner"></div><span>carregando...</span></div>
        <div id="empty-state" style="display:none;">Nenhum item encontrado</div>
        <div id="grid"></div>
        <div id="episodes-panel" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const state = {
    server:'', user:'', pass:'',
    tab:'live',
    liveCats:[], liveStreams:[], liveActiveCat:null,
    vodCats:[], vodStreams:[], vodActiveCat:null,
    seriesCats:[], seriesList:[], seriesActiveCat:null,
    viewingSeries:null,
    search:''
  };

  let hls = null;

  const el = id => document.getElementById(id);
  const grid = el('grid');
  const gridArea = el('grid-area');
  const gridTitle = el('grid-title');
  const sidebar = el('sidebar');
  const loadingState = el('loading-state');
  const emptyState = el('empty-state');
  const episodesPanel = el('episodes-panel');
  const video = el('video');
  const playerWrap = el('player-wrap');
  const nowPlayingText = el('now-playing-text');

  // ---- persistence ----
  function loadSaved(){
    try{
      const raw = localStorage.getItem('sinal_creds');
      if(raw){
        const c = JSON.parse(raw);
        el('f-server').value = c.server || '';
        el('f-user').value = c.user || '';
        el('f-pass').value = c.pass || '';
      }
    }catch(e){}
  }
  function saveCreds(){
    if(el('f-remember').checked){
      localStorage.setItem('sinal_creds', JSON.stringify({server:state.server, user:state.user, pass:state.pass}));
    } else {
      localStorage.removeItem('sinal_creds');
    }
  }
  loadSaved();

  // ---- API helpers ----
  function baseUrl(){
    let s = state.server.trim();
    if(!/^https?:\/\//i.test(s)) s = 'http://' + s;
    return s.replace(/\/+$/,'');
  }
  function apiUrl(action, extra){
    let u = `${baseUrl()}/player_api.php?username=${encodeURIComponent(state.user)}&password=${encodeURIComponent(state.pass)}`;
    if(action) u += `&action=${action}`;
    if(extra) u += extra;
    return u;
  }
  async function apiGet(action, extra){
    const res = await fetch(apiUrl(action, extra));
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  // ---- login ----
  el('login-btn').addEventListener('click', doLogin);
  [el('f-server'), el('f-user'), el('f-pass')].forEach(inp=>{
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  });

  async function doLogin(){
    const server = el('f-server').value.trim();
    const user = el('f-user').value.trim();
    const pass = el('f-pass').value;
    const msg = el('login-msg');

    if(!server || !user || !pass){
      msg.textContent = 'Preencha servidor, usuário e senha.';
      msg.className = 'login-msg err';
      return;
    }

    state.server = server; state.user = user; state.pass = pass;

    const btn = el('login-btn');
    btn.disabled = true; btn.textContent = 'Conectando...';
    msg.className = 'login-msg';
    msg.textContent = 'Autenticando com o servidor...';

    try{
      const data = await apiGet('');
      if(data && data.user_info && data.user_info.auth === 1){
        saveCreds();
        msg.textContent = '';
        const exp = data.user_info.exp_date;
        const expStr = exp ? new Date(exp*1000).toLocaleDateString('pt-BR') : 'desconhecida';
        el('login-screen').style.display = 'none';
        el('app').classList.add('active');
        el('topbar').insertAdjacentHTML('beforeend','');
        loadTab('live');
      } else {
        msg.textContent = 'Credenciais inválidas ou servidor recusou a conexão.';
        msg.className = 'login-msg err';
      }
    }catch(err){
      msg.textContent = 'Não foi possível conectar. Verifique o endereço do servidor.';
      msg.className = 'login-msg err';
    }finally{
      btn.disabled = false; btn.textContent = 'Conectar';
    }
  }

  el('logout-btn').addEventListener('click', ()=>{
    stopPlayer();
    el('app').classList.remove('active');
    el('login-screen').style.display = 'flex';
  });

  // ---- tabs ----
  document.querySelectorAll('.top-tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.top-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.viewingSeries = null;
      loadTab(btn.dataset.tab);
    });
  });

  async function loadTab(tab){
    state.tab = tab;
    episodesPanel.style.display = 'none';
    grid.style.display = 'grid';
    showLoading(true);
    sidebar.innerHTML = '';
    grid.innerHTML = '';

    try{
      if(tab === 'live'){
        gridTitle.textContent = 'TV Ao Vivo';
        if(state.liveCats.length===0){
          state.liveCats = await apiGet('get_live_categories') || [];
          state.liveStreams = await apiGet('get_live_streams') || [];
        }
        renderSidebar(state.liveCats, state.liveStreams, 'liveActiveCat');
        renderGrid(filterByCat(state.liveStreams, state.liveActiveCat), 'live');
      } else if(tab === 'vod'){
        gridTitle.textContent = 'Filmes';
        if(state.vodCats.length===0){
          state.vodCats = await apiGet('get_vod_categories') || [];
          state.vodStreams = await apiGet('get_vod_streams') || [];
        }
        renderSidebar(state.vodCats, state.vodStreams, 'vodActiveCat');
        renderGrid(filterByCat(state.vodStreams, state.vodActiveCat), 'vod');
      } else if(tab === 'series'){
        gridTitle.textContent = 'Séries';
        if(state.seriesCats.length===0){
          state.seriesCats = await apiGet('get_series_categories') || [];
          state.seriesList = await apiGet('get_series') || [];
        }
        renderSidebar(state.seriesCats, state.seriesList, 'seriesActiveCat');
        renderGrid(filterByCat(state.seriesList, state.seriesActiveCat), 'series');
      }
    }catch(err){
      emptyState.textContent = 'Erro ao carregar dados do servidor.';
      emptyState.style.display = 'flex';
    }finally{
      showLoading(false);
    }
  }

  function filterByCat(list, activeCat){
    let filtered = list;
    if(activeCat) filtered = filtered.filter(i => i.category_id === activeCat);
    if(state.search){
      const q = state.search.toLowerCase();
      filtered = filtered.filter(i => (i.name||'').toLowerCase().includes(q));
    }
    return filtered;
  }

  function showLoading(v){
    loadingState.style.display = v ? 'flex' : 'none';
    grid.style.display = v ? 'none' : 'grid';
  }

  function renderSidebar(cats, streams, activeKey){
    sidebar.innerHTML = '';
    const allItem = document.createElement('div');
    allItem.className = 'cat-item' + (state[activeKey]===null ? ' active' : '');
    allItem.innerHTML = `<span>Todos</span><span class="cat-count">${streams.length}</span>`;
    allItem.addEventListener('click', ()=>{ state[activeKey]=null; refreshGridOnly(); });
    sidebar.appendChild(allItem);

    cats.forEach(cat=>{
      const count = streams.filter(s=>s.category_id===cat.category_id).length;
      if(count===0) return;
      const item = document.createElement('div');
      item.className = 'cat-item' + (state[activeKey]===cat.category_id ? ' active':'');
      item.innerHTML = `<span>${escapeHtml(cat.category_name)}</span><span class="cat-count">${count}</span>`;
      item.addEventListener('click', ()=>{
        state[activeKey] = cat.category_id;
        document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active'));
        item.classList.add('active');
        refreshGridOnly();
      });
      sidebar.appendChild(item);
    });
  }

  function refreshGridOnly(){
    let list, key, tab;
    if(state.tab==='live'){ list=state.liveStreams; key='liveActiveCat'; tab='live'; }
    else if(state.tab==='vod'){ list=state.vodStreams; key='vodActiveCat'; tab='vod'; }
    else { list=state.seriesList; key='seriesActiveCat'; tab='series'; }
    renderGrid(filterByCat(list, state[key]), tab);
  }

  function renderGrid(items, type){
    grid.innerHTML = '';
    episodesPanel.style.display = 'none';
    grid.style.display = 'grid';
    emptyState.style.display = items.length===0 ? 'flex' : 'none';

    items.forEach(item=>{
      const card = document.createElement('div');
      card.className = 'item-card' + (type==='live' ? ' channel-card' : '');
      const img = item.stream_icon || item.cover || '';
      card.innerHTML = `
        <div class="item-thumb">${img ? `<img src="${img}" loading="lazy" onerror="this.parentNode.innerHTML='▶'">` : '▶'}</div>
        <div class="item-name">${escapeHtml(item.name)}</div>
      `;
      card.addEventListener('click', ()=>{
        if(type==='live') playLive(item);
        else if(type==='vod') playVod(item);
        else openSeries(item);
      });
      grid.appendChild(card);
    });
  }

  // ---- search ----
  el('search-box').addEventListener('input', e=>{
    state.search = e.target.value;
    refreshGridOnly();
  });

  // ---- player ----
  function stopPlayer(){
    if(hls){ hls.destroy(); hls = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    playerWrap.classList.add('hidden');
  }

  function playStream(url, label, isLive){
    playerWrap.classList.remove('hidden');
    nowPlayingText.textContent = label;
    el('now-playing').querySelector('.live-dot').style.display = isLive ? 'inline-block' : 'none';

    if(hls){ hls.destroy(); hls = null; }

    if(url.endsWith('.m3u8') && window.Hls && Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
    } else {
      video.src = url;
      video.play();
    }
    playerWrap.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function playLive(item){
    const ext = item.stream_type === 'live' ? 'm3u8' : 'm3u8';
    const url = `${baseUrl()}/live/${state.user}/${state.pass}/${item.stream_id}.${ext}`;
    playStream(url, item.name, true);
  }

  function playVod(item){
    const ext = item.container_extension || 'mp4';
    const url = `${baseUrl()}/movie/${state.user}/${state.pass}/${item.stream_id}.${ext}`;
    playStream(url, item.name, false);
  }

  el('close-player').addEventListener('click', stopPlayer);

  // ---- series ----
  async function openSeries(item){
    state.viewingSeries = item;
    grid.style.display = 'none';
    episodesPanel.style.display = 'block';
    episodesPanel.innerHTML = '<div class="spinner"></div>';

    try{
      const data = await apiGet('get_series_info', `&series_id=${item.series_id}`);
      const seasons = data.episodes || {};
      let html = `<div class="back-link" id="back-to-series">← Voltar para Séries</div>
        <div style="font-family:var(--mono); font-size:14px; color:var(--text); margin-bottom:4px;">${escapeHtml(item.name)}</div>
        <div style="font-family:var(--mono); font-size:11px; color:var(--dim);">${escapeHtml(item.plot || '')}</div>`;

      const seasonKeys = Object.keys(seasons);
      if(seasonKeys.length===0){
        html += '<div style="margin-top:20px; color:var(--dim); font-family:var(--mono); font-size:12px;">Nenhum episódio disponível.</div>';
      }
      seasonKeys.forEach(sk=>{
        html += `<div class="season-title">Temporada ${sk}</div>`;
        seasons[sk].forEach(ep=>{
          html += `<div class="ep-row" data-season="${sk}" data-ep-id="${ep.id}" data-ext="${ep.container_extension||'mp4'}" data-name="${escapeHtml(ep.title || 'Episódio '+ep.episode_num)}">
            <span class="ep-num">${String(ep.episode_num).padStart(2,'0')}</span>
            <span class="ep-name">${escapeHtml(ep.title || 'Episódio '+ep.episode_num)}</span>
          </div>`;
        });
      });
      episodesPanel.innerHTML = html;

      el('back-to-series').addEventListener('click', ()=>{
        episodesPanel.style.display = 'none';
        grid.style.display = 'grid';
      });
      episodesPanel.querySelectorAll('.ep-row').forEach(row=>{
        row.addEventListener('click', ()=>{
          const url = `${baseUrl()}/series/${state.user}/${state.pass}/${row.dataset.epId}.${row.dataset.ext}`;
          playStream(url, `${item.name} — ${row.dataset.name}`, false);
        });
      });
    }catch(err){
      episodesPanel.innerHTML = '<div style="color:var(--dim); font-family:var(--mono); font-size:12px;">Erro ao carregar episódios.</div>';
    }
  }

  function escapeHtml(str){
    if(!str) return '';
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

})();
</script>
</body>
</html>
