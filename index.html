<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAL — Player IPTV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg: #0b0b0f;
    --bg-elev: #16161d;
    --bg-elev-2: #1e1e27;
    --line: rgba(255,255,255,0.09);
    --text: #f3f3f1;
    --dim: #9b9ba5;
    --signal: #35e0a1;
    --signal-dim: #1c6e50;
    --accent: #e6394c;
    --accent-2: #ff5a6e;
    --live: #ff4d5e;
    --mono: 'SF Mono', 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --display: 'Bebas Neue', var(--sans);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{height:100%;}
  body{
    min-height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(230,57,76,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(53,224,161,0.05), transparent 40%);
  }
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-track{background:var(--bg-elev);}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--signal-dim);}
  button{font-family:inherit;}
  img{-webkit-user-drag:none;}

  /* ===== LOGIN ===== */
  #login-screen{
    height:100vh; display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .scanline{
    position:absolute; inset:0; pointer-events:none; opacity:0.03;
    background:repeating-linear-gradient(0deg, #fff 0px, transparent 1px, transparent 2px);
  }
  .login-box{
    width:380px; background:var(--bg-elev); border:1px solid var(--line);
    border-radius:6px; padding:36px 32px; position:relative;
    box-shadow: 0 0 0 1px rgba(230,57,76,0.04), 0 20px 60px rgba(0,0,0,0.5);
  }
  .login-box::before{
    content:''; position:absolute; top:0; left:0; width:100%; height:2px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 3s linear infinite;
  }
  @keyframes scan{ 0%{ transform:translateX(-100%);} 100%{ transform:translateX(100%);} }
  .brand{
    font-family:var(--display); font-size:22px; letter-spacing:3px; color:var(--text);
    margin-bottom:2px; display:flex; align-items:center; gap:9px; line-height:1;
  }
  .brand .dot{width:8px; height:8px; border-radius:50%; background:var(--signal); box-shadow:0 0 8px var(--signal); animation:blink 1.6s ease-in-out infinite; flex-shrink:0;}
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .brand-sub{ font-size:11px; color:var(--dim); font-family:var(--mono); margin-bottom:28px; letter-spacing:1px;}
  .field{ margin-bottom:16px; }
  .field label{
    display:block; font-family:var(--mono); font-size:10px; letter-spacing:1.5px;
    color:var(--dim); text-transform:uppercase; margin-bottom:6px;
  }
  .field input{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text);
    padding:11px 12px; font-family:var(--mono); font-size:13px; border-radius:4px;
    outline:none; transition:border-color 0.15s;
  }
  .field input:focus{ border-color:var(--signal-dim); }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  #login-btn{
    width:100%; margin-top:8px; padding:12px; background:var(--accent); color:#fff;
    border:none; font-family:var(--sans); font-weight:700; font-size:13px; letter-spacing:1px;
    cursor:pointer; border-radius:4px; transition:filter 0.15s;
  }
  #login-btn:hover{ filter:brightness(1.12); }
  #login-btn:disabled{ opacity:0.5; cursor:wait; }
  .login-msg{ font-family:var(--mono); font-size:11px; margin-top:14px; min-height:16px; color:var(--dim); }
  .login-msg.err{ color:var(--live); }
  .remember{ display:flex; align-items:center; gap:8px; margin-top:16px; }
  .remember input{ accent-color:var(--signal); }
  .remember label{ font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:0.5px; }

  /* ===== APP SHELL ===== */
  #app{ display:none; min-height:100vh; flex-direction:column; }
  #app.active{ display:flex; }

  #topbar{
    position:fixed; top:0; left:0; right:0; z-index:60;
    height:64px; display:flex; align-items:center; padding:0 4%; gap:28px;
    background:linear-gradient(180deg, rgba(0,0,0,0.75), transparent);
    border-bottom:1px solid transparent; transition:background 0.25s ease, border-color 0.25s ease;
  }
  #topbar.scrolled{ background:var(--bg); border-color:var(--line); }
  #topbar .brand{ font-size:16px; }
  .top-tabs{ display:flex; gap:4px; flex:1; }
  .top-tab{
    font-family:var(--sans); font-size:13px; font-weight:600; color:var(--dim);
    background:none; border:none; padding:8px 12px; cursor:pointer;
    border-bottom:2px solid transparent; transition:color 0.15s, border-color 0.15s;
  }
  .top-tab:hover{ color:var(--text); }
  .top-tab.active{ color:var(--text); border-color:var(--accent); }
  #search-box{
    background:rgba(0,0,0,0.55); border:1px solid var(--line); color:var(--text);
    padding:8px 12px; font-family:var(--sans); font-size:13px; width:200px; border-radius:4px; outline:none;
    transition:border-color .15s, background .15s;
  }
  #search-box:focus{ border-color:var(--signal-dim); background:rgba(0,0,0,0.85); }
  #logout-btn{
    font-family:var(--sans); font-size:12px; font-weight:600; color:var(--dim); background:none;
    border:1px solid var(--line); padding:7px 14px; cursor:pointer; border-radius:4px; transition:color .15s, border-color .15s;
  }
  #logout-btn:hover{ color:var(--live); border-color:var(--live); }

  #page{ flex:1; padding-bottom:60px; }

  /* ===== HERO ===== */
  #hero{ position:relative; height:76vh; min-height:420px; display:flex; align-items:flex-end; }
  #hero-bg{ position:absolute; inset:0; background-size:cover; background-position:center 20%; background-color:var(--bg-elev); }
  #hero-bg::after{
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(11,11,15,0.1) 0%, rgba(11,11,15,0.35) 55%, var(--bg) 97%),
      linear-gradient(90deg, rgba(11,11,15,0.92) 0%, rgba(11,11,15,0.55) 40%, transparent 70%);
  }
  #hero-content{ position:relative; z-index:2; padding:0 4% 56px; max-width:640px; }
  #hero-tag{ font-family:var(--mono); font-size:11px; letter-spacing:2px; color:var(--signal); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  #hero-tag .live-dot-hero{ width:6px; height:6px; border-radius:50%; background:var(--live); animation:blink 1s infinite; }
  #hero-title{ font-family:var(--display); font-size:clamp(2.4rem,6vw,4.6rem); line-height:0.95; letter-spacing:0.5px; text-shadow:0 2px 16px rgba(0,0,0,0.6); }
  #hero-desc{ margin:16px 0 24px; font-size:15px; line-height:1.55; color:#dcdce0;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; max-width:520px; }
  #hero-actions{ display:flex; gap:12px; }
  .btn-primary, .btn-secondary{
    border:none; padding:12px 26px; font-weight:700; font-size:14px; border-radius:4px;
    display:inline-flex; align-items:center; gap:8px; cursor:pointer; transition:filter .15s, background .15s;
  }
  .btn-primary{ background:#fff; color:#111; }
  .btn-primary:hover{ filter:brightness(0.9); }
  .btn-secondary{ background:rgba(120,120,130,0.35); color:#fff; backdrop-filter:blur(6px); }
  .btn-secondary:hover{ background:rgba(120,120,130,0.55); }

  /* ===== ROWS ===== */
  #rows-container{ margin-top:8px; }
  .row{ margin:0 0 2.4vw; }
  .row-title-wrap{ display:flex; align-items:baseline; justify-content:space-between; padding:0 4% 8px; }
  .row-title{ font-family:var(--display); font-size:1.3rem; letter-spacing:0.5px; color:var(--text); }
  .row-see-all{ font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; cursor:pointer; white-space:nowrap; }
  .row-see-all:hover{ color:var(--signal); }
  .row-scroller{ position:relative; }
  .row-track{
    display:flex; gap:8px; overflow-x:auto; scroll-behavior:smooth; padding:6px 4% 22px;
    scrollbar-width:none; -ms-overflow-style:none;
  }
  .row-track::-webkit-scrollbar{ display:none; }
  .row-arrow{
    position:absolute; top:0; bottom:22px; width:44px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(90deg, var(--bg), transparent); border:none; color:#fff; cursor:pointer;
    opacity:0; transition:opacity .15s; z-index:3; font-size:20px;
  }
  .row-arrow.right{ right:0; left:auto; background:linear-gradient(270deg, var(--bg), transparent); }
  .row-scroller:hover .row-arrow{ opacity:1; }

  .card{ position:relative; flex:0 0 auto; width:168px; border-radius:5px; overflow:hidden; cursor:pointer;
    background:var(--bg-elev); transition:transform .22s ease, box-shadow .22s ease; }
  .card:hover{ transform:scale(1.08); z-index:5; box-shadow:0 14px 30px rgba(0,0,0,0.65); }
  .card.channel{ width:230px; }
  .card-thumb{ width:100%; aspect-ratio:2/3; background:var(--bg-elev-2); display:flex; align-items:center; justify-content:center; color:var(--dim); font-size:22px; overflow:hidden; }
  .card.channel .card-thumb{ aspect-ratio:16/9; }
  .card-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card-overlay{ position:absolute; inset:auto 0 0 0; padding:8px 9px; background:linear-gradient(transparent, rgba(0,0,0,0.92));
    opacity:0; transition:opacity .18s; }
  .card:hover .card-overlay{ opacity:1; }
  .card-overlay-title{ font-size:11.5px; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-play-badge{ position:absolute; top:8px; left:8px; width:28px; height:28px; border-radius:50%;
    background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .18s; font-size:12px; }
  .card:hover .card-play-badge{ opacity:1; }
  .card-info-badge{ position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%;
    background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .18s; font-size:12px; color:var(--text); }
  .card:hover .card-info-badge{ opacity:1; }
  .card-info-badge:hover{ border-color:var(--signal); color:var(--signal); }

  /* ===== GRID VIEWS (search / see all) ===== */
  #search-results, #category-grid-view{ display:none; padding:100px 4% 0; }
  .grid-heading{ display:flex; align-items:center; gap:14px; margin-bottom:18px; font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:1.5px; text-transform:uppercase; }
  .back-link{ color:var(--dim); cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  .back-link:hover{ color:var(--signal); }
  .poster-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:14px; }
  .poster-grid .card{ width:auto; }

  #loading-state, #empty-state{
    height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--dim); font-family:var(--mono); font-size:12px; letter-spacing:1px; gap:10px;
  }
  .spinner{ width:22px; height:22px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== INFO / EPISODES MODAL ===== */
  #info-modal{ display:none; position:fixed; inset:0; z-index:150; background:rgba(0,0,0,0.75);
    align-items:flex-start; justify-content:center; padding:5vh 16px; overflow-y:auto; }
  .modal-box{ width:100%; max-width:780px; background:var(--bg-elev); border-radius:8px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.6); animation:modalIn .18s ease; }
  @keyframes modalIn{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0);} }
  .modal-hero{ position:relative; height:280px; background-size:cover; background-position:center; background-color:var(--bg-elev-2); display:flex; align-items:flex-end; padding:24px; }
  .modal-hero-fade{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(11,11,15,0.1), var(--bg-elev) 96%); }
  .modal-close{ position:absolute; top:14px; right:14px; z-index:3; width:34px; height:34px; border-radius:50%;
    background:var(--bg); border:1px solid var(--line); color:var(--text); cursor:pointer; font-size:15px; }
  .modal-close:hover{ border-color:var(--live); color:var(--live); }
  .modal-play{ position:relative; z-index:2; }
  .modal-play.hidden{ display:none; }
  .modal-body{ padding:6px 28px 30px; }
  .modal-meta{ font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .modal-body h2{ font-family:var(--display); font-size:1.8rem; letter-spacing:0.5px; margin-bottom:12px; }
  .modal-plot{ font-size:13.5px; line-height:1.6; color:var(--dim); margin-bottom:6px; }

  .season-title{ font-family:var(--mono); font-size:11px; color:var(--signal); letter-spacing:2px; margin:22px 0 10px; text-transform:uppercase; }
  .ep-row{
    display:flex; justify-content:space-between; align-items:center; padding:11px 14px;
    background:var(--bg); border:1px solid var(--line); margin-bottom:6px; cursor:pointer; border-radius:4px; transition:border-color .15s;
  }
  .ep-row:hover{ border-color:var(--signal-dim); }
  .ep-num{ font-family:var(--mono); color:var(--dim); font-size:11px; width:36px; flex-shrink:0; }
  .ep-name{ flex:1; font-size:13px; }

  /* ===== PLAYER OVERLAY ===== */
  #player-overlay{ display:none; position:fixed; inset:0; z-index:200; background:#000; }
  #player-overlay.active{ display:flex; align-items:center; justify-content:center; }
  #video{ width:100%; height:100%; display:block; background:#000; }
  #player-topbar{ position:absolute; top:0; left:0; right:0; z-index:2; padding:16px 20px;
    display:flex; align-items:center; gap:12px; background:linear-gradient(rgba(0,0,0,0.7), transparent); }
  #close-player{
    background:rgba(0,0,0,0.5); border:1px solid var(--line); border-radius:50%;
    color:var(--text); width:36px; height:36px; cursor:pointer; font-size:16px; flex-shrink:0;
  }
  #close-player:hover{ color:var(--live); border-color:var(--live); }
  #now-playing{ font-family:var(--mono); font-size:12px; color:var(--text); display:flex; align-items:center; gap:8px; letter-spacing:0.5px; }
  #now-playing .live-dot{ width:6px; height:6px; border-radius:50%; background:var(--live); animation:blink 1s infinite; }
  #player-error{ display:none; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:3;
    background:rgba(20,10,12,0.92); border:1px solid var(--accent); color:#fff; padding:16px 22px; border-radius:6px;
    font-family:var(--mono); font-size:12.5px; max-width:520px; text-align:center; line-height:1.6; }
  #player-loading{ display:none; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:3;
    flex-direction:column; align-items:center; gap:10px; color:var(--dim); font-family:var(--mono); font-size:11.5px; letter-spacing:1px; }

  @media(max-width:760px){
    #topbar{ gap:14px; padding:0 4%; }
    .top-tabs{ gap:0; }
    .top-tab{ padding:8px 8px; font-size:11.5px; }
    #search-box{ width:110px; }
    #hero{ height:60vh; }
    .card{ width:128px; }
    .card.channel{ width:180px; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="scanline"></div>
  <div class="login-box">
    <div class="brand"><span class="dot"></span>SINAL</div>
    <div class="brand-sub">PLAYER XTREAM CODES</div>

    <div class="field">
      <label>Endereço do servidor</label>
      <input id="f-server" type="text" placeholder="http://exemplo.com:8080" value="https://sinal-proxy.jessica-pereira.workers.dev" autocomplete="off">
      <div style="font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:6px;">Use o endereço do proxy: https://sinal-proxy.jessica-pereira.workers.dev</div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Usuário</label>
        <input id="f-user" type="text" autocomplete="off">
      </div>
      <div class="field">
        <label>Senha</label>
        <input id="f-pass" type="password" autocomplete="off">
      </div>
    </div>
    <button id="login-btn">Conectar</button>
    <div class="remember">
      <input type="checkbox" id="f-remember" checked>
      <label for="f-remember">Lembrar credenciais neste navegador</label>
    </div>
    <div class="login-msg" id="login-msg"></div>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="brand"><span class="dot"></span>SINAL</div>
    <div class="top-tabs">
      <button class="top-tab active" data-tab="live">TV Ao Vivo</button>
      <button class="top-tab" data-tab="vod">Filmes</button>
      <button class="top-tab" data-tab="series">Séries</button>
    </div>
    <input id="search-box" type="text" placeholder="buscar...">
    <button id="logout-btn">Sair</button>
  </div>

  <div id="page">
    <div id="loading-state" style="display:none;"><div class="spinner"></div><span>carregando...</span></div>
    <div id="empty-state" style="display:none;">Nenhum item encontrado</div>

    <div id="hero" style="display:none;">
      <div id="hero-bg"></div>
      <div id="hero-content">
        <div id="hero-tag"></div>
        <div id="hero-title"></div>
        <div id="hero-desc"></div>
        <div id="hero-actions">
          <button class="btn-primary" id="hero-play">▶ Assistir</button>
          <button class="btn-secondary" id="hero-info">ⓘ Mais informações</button>
        </div>
      </div>
    </div>

    <div id="rows-container"></div>

    <div id="search-results">
      <div class="grid-heading" id="search-heading"></div>
      <div class="poster-grid" id="search-grid"></div>
    </div>

    <div id="category-grid-view">
      <div class="grid-heading"><span class="back-link" id="back-to-rows">← Voltar</span><span id="category-grid-title"></span></div>
      <div class="poster-grid" id="category-grid"></div>
    </div>
  </div>
</div>

<div id="info-modal"></div>

<div id="player-overlay">
  <video id="video" controls autoplay playsinline></video>
  <div id="player-topbar">
    <button id="close-player">✕</button>
    <div id="now-playing"><span class="live-dot"></span><span id="now-playing-text"></span></div>
  </div>
  <div id="player-error"></div>
  <div id="player-loading"><div class="spinner"></div><span>verificando formato do arquivo...</span></div>
</div>

<script>
(function(){
  const state = {
    server:'', user:'', pass:'',
    tab:'live',
    liveCats:[], liveStreams:[], liveActiveCat:null,
    vodCats:[], vodStreams:[], vodActiveCat:null,
    seriesCats:[], seriesList:[], seriesActiveCat:null,
    search:''
  };

  let hls = null;

  const el = id => document.getElementById(id);
  const page = el('page');
  const heroEl = el('hero');
  const heroBg = el('hero-bg');
  const heroTag = el('hero-tag');
  const heroTitle = el('hero-title');
  const heroDesc = el('hero-desc');
  const rowsContainer = el('rows-container');
  const loadingState = el('loading-state');
  const emptyState = el('empty-state');
  const searchResults = el('search-results');
  const searchGrid = el('search-grid');
  const searchHeading = el('search-heading');
  const categoryGridView = el('category-grid-view');
  const categoryGrid = el('category-grid');
  const infoModal = el('info-modal');
  const video = el('video');
  const playerOverlay = el('player-overlay');
  const nowPlayingText = el('now-playing-text');
  const playerError = el('player-error');
  const playerLoading = el('player-loading');
  const topbar = el('topbar');
  const VOD_EXT_FALLBACKS = ['mp4','mkv','avi','ts','m3u8'];

  // ---- persistence ----
  function loadSaved(){
    try{
      const raw = localStorage.getItem('sinal_creds');
      if(raw){
        const c = JSON.parse(raw);
        el('f-server').value = c.server || el('f-server').value;
        el('f-user').value = c.user || '';
        el('f-pass').value = c.pass || '';
      }
    }catch(e){}
  }
  function saveCreds(){
    if(el('f-remember').checked){
      localStorage.setItem('sinal_creds', JSON.stringify({server:state.server, user:state.user, pass:state.pass}));
    } else {
      localStorage.removeItem('sinal_creds');
    }
  }
  loadSaved();

  // ---- API helpers ----
  function baseUrl(){
    let s = state.server.trim();
    if(!/^https?:\/\//i.test(s)) s = 'http://' + s;
    return s.replace(/\/+$/,'');
  }
  function apiUrl(action, extra){
    let u = `${baseUrl()}/player_api.php?username=${encodeURIComponent(state.user)}&password=${encodeURIComponent(state.pass)}`;
    if(action) u += `&action=${action}`;
    if(extra) u += extra;
    return u;
  }
  async function apiGet(action, extra){
    const res = await fetch(apiUrl(action, extra));
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  // ---- scroll -> topbar solid ----
  window.addEventListener('scroll', ()=>{
    topbar.classList.toggle('scrolled', window.scrollY > 40);
  });

  // ---- login ----
  el('login-btn').addEventListener('click', doLogin);
  [el('f-server'), el('f-user'), el('f-pass')].forEach(inp=>{
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  });

  async function doLogin(){
    const server = el('f-server').value.trim();
    const user = el('f-user').value.trim();
    const pass = el('f-pass').value;
    const msg = el('login-msg');

    if(!server || !user || !pass){
      msg.textContent = 'Preencha servidor, usuário e senha.';
      msg.className = 'login-msg err';
      return;
    }

    state.server = server; state.user = user; state.pass = pass;

    const btn = el('login-btn');
    btn.disabled = true; btn.textContent = 'Conectando...';
    msg.className = 'login-msg';
    msg.textContent = 'Autenticando com o servidor...';

    try{
      const data = await apiGet('');
      if(data && data.user_info && data.user_info.auth === 1){
        saveCreds();
        msg.textContent = '';
        el('login-screen').style.display = 'none';
        el('app').classList.add('active');
        loadTab('live');
      } else {
        msg.textContent = 'Credenciais inválidas ou servidor recusou a conexão.';
        msg.className = 'login-msg err';
      }
    }catch(err){
      msg.textContent = 'Não foi possível conectar. Verifique o endereço do servidor.';
      msg.className = 'login-msg err';
    }finally{
      btn.disabled = false; btn.textContent = 'Conectar';
    }
  }

  el('logout-btn').addEventListener('click', ()=>{
    stopPlayer();
    el('app').classList.remove('active');
    el('login-screen').style.display = 'flex';
    window.scrollTo(0,0);
  });

  // ---- tabs ----
  document.querySelectorAll('.top-tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.top-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      loadTab(btn.dataset.tab);
      window.scrollTo(0,0);
    });
  });

  async function loadTab(tab){
    state.tab = tab;
    closeCategoryGrid();
    showLoading(true);
    heroEl.style.display = 'none';
    rowsContainer.innerHTML = '';
    emptyState.style.display = 'none';

    try{
      if(tab === 'live'){
        if(state.liveCats.length===0){
          state.liveCats = await apiGet('get_live_categories') || [];
          state.liveStreams = await apiGet('get_live_streams') || [];
        }
      } else if(tab === 'vod'){
        if(state.vodCats.length===0){
          state.vodCats = await apiGet('get_vod_categories') || [];
          state.vodStreams = await apiGet('get_vod_streams') || [];
        }
      } else if(tab === 'series'){
        if(state.seriesCats.length===0){
          state.seriesCats = await apiGet('get_series_categories') || [];
          state.seriesList = await apiGet('get_series') || [];
        }
      }
      renderHome();
    }catch(err){
      emptyState.textContent = 'Erro ao carregar dados do servidor.';
      emptyState.style.display = 'flex';
    }finally{
      showLoading(false);
    }
  }

  function currentData(){
    if(state.tab==='live') return {list:state.liveStreams, cats:state.liveCats, type:'live'};
    if(state.tab==='vod') return {list:state.vodStreams, cats:state.vodCats, type:'vod'};
    return {list:state.seriesList, cats:state.seriesCats, type:'series'};
  }

  function itemImage(item){ return item.stream_icon || item.cover || item.cover_big || ''; }

  function showLoading(v){ loadingState.style.display = v ? 'flex' : 'none'; }

  // ---- home: hero + rows ----
  function renderHome(){
    const {list, cats, type} = currentData();

    if(state.search){
      renderSearchResults(list, type);
      return;
    }
    searchResults.style.display = 'none';
    closeCategoryGrid();

    if(list.length === 0){
      heroEl.style.display = 'none';
      rowsContainer.innerHTML = '';
      emptyState.style.display = 'flex';
      return;
    }
    emptyState.style.display = 'none';

    const featured = list.find(i => itemImage(i)) || list[0];
    buildHero(featured, type);
    buildRows(cats, list, type);
  }

  function buildHero(item, type){
    heroEl.style.display = 'flex';
    const img = itemImage(item);
    heroBg.style.backgroundImage = img ? `url('${img}')` : 'none';

    heroTag.innerHTML = type==='live'
      ? '<span class="live-dot-hero"></span> AO VIVO'
      : (type==='series' ? 'SÉRIE' : 'FILME');
    heroTitle.textContent = item.name || '';
    heroDesc.textContent = item.plot || (type==='live' ? 'Assista agora ao vivo no SINAL.' : 'Sem descrição disponível para este título.');

    const heroPlay = el('hero-play');
    const heroInfo = el('hero-info');
    heroPlay.onclick = () => {
      if(type==='live') playLive(item);
      else if(type==='vod') playVod(item);
      else openSeriesModal(item);
    };
    heroInfo.onclick = () => openInfoModal(item, type);
  }

  function buildRows(cats, list, type){
    rowsContainer.innerHTML = '';
    const usedCats = [];
    cats.forEach(cat=>{
      const items = list.filter(i => i.category_id === cat.category_id);
      if(items.length) usedCats.push({cat, items});
    });
    const uncategorized = list.filter(i => !cats.some(c => c.category_id === i.category_id));
    if(uncategorized.length) usedCats.push({cat:{category_id:null, category_name:'Outros'}, items:uncategorized});

    usedCats.forEach(({cat, items}) => {
      rowsContainer.appendChild(buildRow(cat, items, type));
    });
  }

  function buildRow(cat, items, type){
    const row = document.createElement('div');
    row.className = 'row';

    const titleWrap = document.createElement('div');
    titleWrap.className = 'row-title-wrap';
    titleWrap.innerHTML = `<div class="row-title">${escapeHtml(cat.category_name)}</div>
      <div class="row-see-all">Ver tudo (${items.length})</div>`;
    titleWrap.querySelector('.row-see-all').addEventListener('click', ()=> openCategoryGrid(cat, items, type));
    row.appendChild(titleWrap);

    const scroller = document.createElement('div');
    scroller.className = 'row-scroller';

    const leftArrow = document.createElement('button');
    leftArrow.className = 'row-arrow'; leftArrow.textContent = '‹';
    const rightArrow = document.createElement('button');
    rightArrow.className = 'row-arrow right'; rightArrow.textContent = '›';

    const track = document.createElement('div');
    track.className = 'row-track';
    items.slice(0, 30).forEach(item => track.appendChild(createCard(item, type)));

    leftArrow.addEventListener('click', ()=> track.scrollBy({left:-track.clientWidth*0.8, behavior:'smooth'}));
    rightArrow.addEventListener('click', ()=> track.scrollBy({left:track.clientWidth*0.8, behavior:'smooth'}));

    scroller.appendChild(leftArrow);
    scroller.appendChild(track);
    scroller.appendChild(rightArrow);
    row.appendChild(scroller);
    return row;
  }

  function createCard(item, type){
    const card = document.createElement('div');
    card.className = 'card' + (type==='live' ? ' channel' : '');
    const img = itemImage(item);
    card.innerHTML = `
      <div class="card-thumb">${img ? `<img src="${img}" loading="lazy" onerror="this.parentNode.innerHTML='▶'">` : '▶'}</div>
      <div class="card-play-badge">▶</div>
      ${type!=='live' ? '<div class="card-info-badge">ⓘ</div>' : ''}
      <div class="card-overlay"><div class="card-overlay-title">${escapeHtml(item.name)}</div></div>
    `;
    card.addEventListener('click', (e)=>{
      if(e.target.closest('.card-info-badge')){ openInfoModal(item, type); return; }
      if(type==='live') playLive(item);
      else if(type==='vod') playVod(item);
      else openSeriesModal(item);
    });
    return card;
  }

  // ---- category "ver tudo" grid ----
  function openCategoryGrid(cat, items, type){
    heroEl.style.display = 'none';
    rowsContainer.style.display = 'none';
    searchResults.style.display = 'none';
    categoryGridView.style.display = 'block';
    el('category-grid-title').textContent = cat.category_name;
    categoryGrid.innerHTML = '';
    items.forEach(item => categoryGrid.appendChild(createCard(item, type)));
  }
  function closeCategoryGrid(){
    categoryGridView.style.display = 'none';
    rowsContainer.style.display = 'block';
  }
  el('back-to-rows').addEventListener('click', ()=>{ closeCategoryGrid(); renderHome(); });

  // ---- search ----
  el('search-box').addEventListener('input', e=>{
    state.search = e.target.value.trim();
    renderHome();
  });

  function renderSearchResults(list, type){
    heroEl.style.display = 'none';
    rowsContainer.style.display = 'none';
    categoryGridView.style.display = 'none';
    searchResults.style.display = 'block';
    const q = state.search.toLowerCase();
    const matches = list.filter(i => (i.name||'').toLowerCase().includes(q));
    searchHeading.textContent = `Resultados para "${state.search}" (${matches.length})`;
    searchGrid.innerHTML = '';
    emptyState.style.display = matches.length===0 ? 'flex' : 'none';
    matches.forEach(item => searchGrid.appendChild(createCard(item, type)));
  }

  // ---- info / episodes modal ----
  function openInfoModal(item, type){
    const img = itemImage(item);
    infoModal.innerHTML = `
      <div class="modal-box">
        <div class="modal-hero" style="background-image:${img?`url('${img}')`:'none'}">
          <div class="modal-hero-fade"></div>
          <button class="modal-close" id="modal-close">✕</button>
          <button class="btn-primary modal-play ${type==='series'?'hidden':''}" id="modal-play">▶ Assistir</button>
        </div>
        <div class="modal-body">
          <div class="modal-meta">${type==='live'?'AO VIVO':(type==='series'?'SÉRIE':'FILME')}</div>
          <h2>${escapeHtml(item.name)}</h2>
          <p class="modal-plot">${escapeHtml(item.plot || 'Sem descrição disponível.')}</p>
          <div id="modal-extra"></div>
        </div>
      </div>`;
    infoModal.style.display = 'flex';
    el('modal-close').onclick = closeInfoModal;
    infoModal.querySelector('.modal-box').addEventListener('click', e=> e.stopPropagation());
    infoModal.addEventListener('click', closeInfoModal, {once:true});

    const playBtn = el('modal-play');
    if(playBtn){
      playBtn.onclick = ()=>{
        closeInfoModal();
        if(type==='live') playLive(item);
        else if(type==='vod') playVod(item);
      };
    }
    if(type==='series') loadSeriesEpisodes(item);
  }
  function closeInfoModal(){ infoModal.style.display='none'; infoModal.innerHTML=''; }

  function openSeriesModal(item){ openInfoModal(item, 'series'); }

  async function loadSeriesEpisodes(item){
    const extra = el('modal-extra');
    extra.innerHTML = '<div class="spinner"></div>';
    try{
      const data = await apiGet('get_series_info', `&series_id=${item.series_id}`);
      const seasons = data.episodes || {};
      const seasonKeys = Object.keys(seasons);
      if(seasonKeys.length===0){
        extra.innerHTML = '<div style="color:var(--dim); font-size:12.5px; margin-top:14px;">Nenhum episódio disponível.</div>';
        return;
      }
      let html = '';
      seasonKeys.forEach(sk=>{
        html += `<div class="season-title">Temporada ${sk}</div>`;
        seasons[sk].forEach(ep=>{
          html += `<div class="ep-row" data-season="${sk}" data-ep-id="${ep.id}" data-ext="${ep.container_extension||'mp4'}" data-name="${escapeHtml(ep.title || 'Episódio '+ep.episode_num)}">
            <span class="ep-num">${String(ep.episode_num).padStart(2,'0')}</span>
            <span class="ep-name">${escapeHtml(ep.title || 'Episódio '+ep.episode_num)}</span>
            <span>▶</span>
          </div>`;
        });
      });
      extra.innerHTML = html;
      extra.querySelectorAll('.ep-row').forEach(row=>{
        row.addEventListener('click', async ()=>{
          const primary = (row.dataset.ext || 'mp4').replace(/^\./,'');
          const exts = [primary, ...VOD_EXT_FALLBACKS.filter(e => e !== primary)];
          const candidates = exts.map(ext => `${baseUrl()}/series/${state.user}/${state.pass}/${row.dataset.epId}.${ext}`);
          const label = `${item.name} — ${row.dataset.name}`;
          closeInfoModal();
          openPlayerOverlay();
          nowPlayingText.textContent = label;
          el('now-playing').querySelector('.live-dot').style.display = 'none';
          showPlayerLoading();
          const { url, ok } = await resolvePlayableUrl(candidates);
          if(!ok){
            showPlayerError('Não consegui encontrar um formato reproduzível para este episódio (testei: ' + exts.join(', ') + '). Abra esta URL direto no navegador para ver o que o servidor devolve: ' + candidates[0]);
            return;
          }
          playStream(url, label, false);
        });
      });
    }catch(err){
      extra.innerHTML = '<div style="color:var(--dim); font-size:12.5px; margin-top:14px;">Erro ao carregar episódios.</div>';
    }
  }

  // ---- player ----
  function openPlayerOverlay(){ playerOverlay.classList.add('active'); }
  function stopPlayer(){
    if(hls){ hls.destroy(); hls = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    playerOverlay.classList.remove('active');
    hidePlayerError();
  }
  el('close-player').addEventListener('click', stopPlayer);

  function showPlayerError(msg){ hidePlayerLoading(); playerError.textContent = msg; playerError.style.display = 'block'; }
  function hidePlayerError(){ playerError.style.display = 'none'; playerError.textContent=''; }
  function showPlayerLoading(msg){ hidePlayerError(); playerLoading.querySelector('span').textContent = msg || 'verificando formato do arquivo...'; playerLoading.style.display = 'flex'; }
  function hidePlayerLoading(){ playerLoading.style.display = 'none'; }

  // Tenta, em sequência, descobrir qual URL entre candidatas realmente devolve
  // mídia reproduzível (faz uma requisição pequena com Range e olha o
  // Content-Type/status). Isso contorna o problema comum do Xtream de
  // devolver "container_extension" errado ou vazio na API de listagem.
  async function resolvePlayableUrl(urls){
    for(const url of urls){
      try{
        const res = await fetch(url, { headers: { Range: 'bytes=0-256' } });
        const ct = (res.headers.get('content-type') || '').toLowerCase();
        const looksLikeMedia = ct.startsWith('video/') || ct.startsWith('audio/') ||
          ct.includes('mpegurl') || ct.includes('octet-stream') || ct.includes('mp2t');
        const looksLikeError = ct.includes('text/html') || ct.includes('application/json');
        if((res.ok || res.status===206) && (looksLikeMedia || (!ct && res.ok))){
          return { url, ok:true };
        }
        if(res.ok && !looksLikeError && !ct){
          return { url, ok:true };
        }
      }catch(e){ /* rede falhou nesta extensão, tenta a próxima */ }
    }
    return { url: urls[0], ok:false };
  }

  function describeVideoError(err){
    const map = {
      1: 'Reprodução cancelada.',
      2: 'Falha de rede ao carregar o stream. É provável que o proxy não esteja repassando esta URL (verifique se ele encaminha as rotas /live/, /movie/ e /series/, não só o player_api.php), ou que o servidor esteja bloqueando CORS.',
      3: 'Erro ao decodificar o stream (formato não suportado pelo navegador).',
      4: 'Formato de vídeo não suportado ou a URL retornou algo que não é um vídeo válido (confira se a URL abre um arquivo de mídia diretamente no navegador).'
    };
    return (err && map[err.code]) || 'Erro desconhecido ao reproduzir este conteúdo.';
  }
  function describeHlsError(data){
    let base;
    if(data.type === 'networkError') base = 'Falha de rede ao buscar o stream ao vivo.';
    else if(data.type === 'mediaError') base = 'Erro de mídia ao decodificar o stream ao vivo.';
    else base = 'Erro ao carregar o stream via HLS.';

    const bits = [];
    if(data.details) bits.push('detalhe: ' + data.details);
    if(data.response && (data.response.code !== undefined)) bits.push('status HTTP: ' + data.response.code);
    if(data.url) bits.push('url: ' + data.url);

    if(bits.length===0) return base + ' Veja o console (F12) para mais detalhes.';
    return base + ' — ' + bits.join(' · ');
  }

  video.addEventListener('error', ()=>{
    if(video.error) showPlayerError(describeVideoError(video.error));
  });

  function playStream(url, label, isLive){
    openPlayerOverlay();
    hidePlayerError();
    hidePlayerLoading();
    nowPlayingText.textContent = label;
    el('now-playing').querySelector('.live-dot').style.display = isLive ? 'inline-block' : 'none';

    if(hls){ hls.destroy(); hls = null; }
    video.removeAttribute('src');
    video.load();

    const isM3u8 = /\.m3u8($|\?)/i.test(url);
    const nativeHlsSupport = video.canPlayType('application/vnd.apple.mpegurl');

    if(isM3u8 && window.Hls && Hls.isSupported()){
      hls = new Hls();
      hls.on(Hls.Events.ERROR, (evt, data)=>{
        console.error('HLS error:', data);
        if(data.fatal) showPlayerError(describeHlsError(data));
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        video.play().catch(e=>{
          console.error('play() falhou:', e);
          showPlayerError('O navegador bloqueou o início automático: ' + e.message);
        });
      });
    } else {
      // native playback (Safari HLS nativo, ou mp4/mkv direto)
      video.src = url;
      video.play().catch(e=>{
        console.error('play() falhou:', e);
        showPlayerError('Erro ao reproduzir: ' + e.message + '. Verifique se a URL é acessível diretamente (abra em outra aba) e se o proxy repassa esta rota.');
      });
    }
  }

  function playLive(item){
    const url = `${baseUrl()}/live/${state.user}/${state.pass}/${item.stream_id}.m3u8`;
    playStream(url, item.name, true);
  }

  async function playVod(item){
    const primary = (item.container_extension || 'mp4').replace(/^\./,'');
    const exts = [primary, ...VOD_EXT_FALLBACKS.filter(e => e !== primary)];
    const candidates = exts.map(ext => `${baseUrl()}/movie/${state.user}/${state.pass}/${item.stream_id}.${ext}`);

    openPlayerOverlay();
    nowPlayingText.textContent = item.name;
    el('now-playing').querySelector('.live-dot').style.display = 'none';
    showPlayerLoading();

    const { url, ok } = await resolvePlayableUrl(candidates);
    if(!ok){
      showPlayerError('Não consegui encontrar um formato reproduzível para "' + item.name + '" (testei: ' + exts.join(', ') + '). Abra esta URL direto no navegador para ver o que o servidor devolve: ' + candidates[0]);
      return;
    }
    playStream(url, item.name, false);
  }

  function escapeHtml(str){
    if(!str) return '';
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

})();
</script>
</body>
</html>
